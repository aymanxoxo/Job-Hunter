# JobHunter configuration. NEVER put secrets here — auth.* hold ENV VAR NAMES only (SDD §8).
# Any field can be overridden by an env var using `__` for nesting, e.g. AI__PROVIDER=ollama (§9.2).
ai:
  provider: gemini          # gemini | ollama | openrouter
  model: gemini-3-flash     # model id within the provider
  batch_size: 15            # jobs per AI scoring call
  min_score: 40             # seeds SearchCriteria.min_score_threshold (ADR-006)
profile:
  input: text               # active profile-input plugin (text | pdf | docx | image …)
connectors:
  adzuna:
    enabled: true
    max_results: 50
    delay_min: 1.5
    delay_max: 4.0
  duckduckgo:
    enabled: true
    max_results: 50
    results_per_query: 10    # stop before noisy results appear
    trust_threshold: 60      # 0 = no filtering, 100 = household-name companies only
    trust_check_enabled: true
  mock:
    enabled: false
    fixture_path: fixtures/jobs.json
output:
  format: both              # csv | json | both
  directory: output/
auth:
  gemini_api_key_env: GEMINI_API_KEY
  openrouter_api_key_env: OPENROUTER_API_KEY
  adzuna_app_id_env: ADZUNA_APP_ID
  adzuna_app_key_env: ADZUNA_APP_KEY
